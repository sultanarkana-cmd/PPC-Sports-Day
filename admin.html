<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PPC Admin Live Scores</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box}body{margin:0;background:#07111f;color:white;font-family:Inter,Arial;padding:16px}h1{font-family:Oswald,sans-serif;text-transform:uppercase}.top{position:sticky;top:0;background:rgba(7,17,31,.95);z-index:10;padding:12px;border:1px solid #334155;border-radius:16px;margin-bottom:12px}button{padding:10px 14px;border:0;border-radius:10px;font-weight:900;margin:4px;cursor:pointer}.primary{background:#006dff;color:white}.danger{background:#d71919;color:white}.status{color:#ffd21e;font-weight:900}.wrap{overflow:auto;border:1px solid #334155;border-radius:14px}table{border-collapse:collapse;min-width:1350px;width:100%}th,td{border:1px solid #334155;padding:7px}th{background:#020617;position:sticky;top:0}input,select{width:100%;padding:7px;border-radius:7px;border:0;font-weight:700}.small{width:60px;text-align:center}.walk{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:12px 0}.card{background:#0f172a;padding:12px;border-radius:14px;border:1px solid #334155}@media(max-width:700px){.walk{grid-template-columns:1fr}}

/* FIX: Bigger readable admin table + white values in inputs/selects */
.wrap {
  overflow-x: auto !important;
  overflow-y: auto !important;
  max-height: 72vh;
}

table {
  min-width: 2300px !important;
  font-size: 16px !important;
}

  padding: 10px !important;

  vertical-align: middle !important;
}

input,

  width: 100% !important;

}

  color: #ffffff !important;

}

.small {
  min-width: 80px !important;
  text-align: center !important;
}

th:nth-child(1), td:nth-child(1) { min-width: 130px !important; }
th:nth-child(2), td:nth-child(2) { min-width: 170px !important; }
th:nth-child(4), td:nth-child(4) { min-width: 140px !important; }
th:nth-child(5), td:nth-child(5),
th:nth-child(7), td:nth-child(7),

th:nth-child(6), td:nth-child(6),

.playersA,
.playersB {

}

</style></head>
<body><div class="top"><h1>PPC Admin Live Scores</h1><p>Keep this page for staff only. Edit scores, then click save. The public page updates instantly.</p><button class="primary" id="save">Save to Firebase</button><button id="load">Load</button><button class="danger" id="reset">Reset Scores Only</button> <span class="status" id="status">Connecting...</span></div>
<div class="walk"><div class="card">Proton steps<input id="wProton" type="number"></div><div class="card">Neutron steps<input id="wNeutron" type="number"></div><div class="card">Electron steps<input id="wElectron" type="number"></div></div>
<div class="wrap"><table><thead><tr><th>Sport</th><th>Category</th><th>Match</th><th>Stage</th><th>Team A</th><th>Players A</th><th>Team B</th><th>Players B</th><th>S1A</th><th>S1B</th><th>S2A</th><th>S2B</th><th>S3A</th><th>S3B</th><th>Sets A</th><th>Sets B</th><th>Score A</th><th>Score B</th><th>Winner</th><th>Pen A</th><th>Pen B</th><th>Pen Winner</th></tr></thead><tbody id="tbody"></tbody></table></div>
<script type="module">

const firebaseConfig={"apiKey": "AIzaSyDTHHWElxSSPhA9fX7PssRblcQ_1rapTp0", "authDomain": "ppc-sports-day-2026.firebaseapp.com", "databaseURL": "https://ppc-sports-day-2026-default-rtdb.asia-southeast1.firebasedatabase.app", "projectId": "ppc-sports-day-2026", "storageBucket": "ppc-sports-day-2026.firebasestorage.app", "messagingSenderId": "146880736946", "appId": "1:146880736946:web:9e4f749b97bc613a7863ab", "measurementId": "G-8MDMNZW6YJ"};

 "-", "s1B": "-", "s2A": "-", "s2B": "-", "s3A": "-", "s3B": "-", "setsWonA": "-", "setsWonB": "-", "matchWinner": "TBD"}, {"sport": "badminton", "category": "double_mix", "match": "M1", "stage": "Qualifying", "teamA": "Proton", "teamB": "Neutron", "s1A": "21", "s1B": "16", "s2A": "21", "s2B": "18", "s3A": "-", "s3B": "-", "setsWonA": "2", "setsWonB": "0", "matchWinner": "Proton"}, {"sport": "badminton", "category": "double_mix", "match": "M2", "stage": "Qualifying", "teamA": "Electron", "teamB": "Proton", "s1A": "19", "s1B": "21", "s2A": "16", "s2B": "21", "s3A": "-", "s3B": "-", "setsWonA": "0", "setsWonB": "2", "matchWinner": "Proton"}, {"sport": "badminton", "category": "double_mix", "match": "M3", "stage": "Qualifying", "teamA": "Neutron", "teamB": "Electron", "s1A": "21", "s1B": "13", "s2A": "21", "s2B": "11", "s3A": "-", "s3B": "-", "setsWonA": "2", "setsWonB": "0", "matchWinner": "Neutron"}, {"sport": "badminton", "category": "double_mix", "match": "M4", "stage": "Final", "teamA": "Pending", "teamB": "Pending", "s1A": "-", "s1B": "-", "s2A": "-", "s2B": "-", "s3A": "-", "s3B": "-", "setsWonA": "-", "setsWonB": "-", "matchWinner": "TBD"}, {"sport": "tabletennis", "category": "mix_double", "match": "M1", "stage": "Qualifying", "teamA": "Proton", "teamB": "Neutron", "s1A": "-", "s1B": "-", "s2A": "-", "s2B": "-", "s3A": "-", "s3B": "-", "setsWonA": "-", "setsWonB": "-", "matchWinner": "TBD"}, {"sport": "tabletennis", "category": "mix_double", "match": "M2", "stage": "Qualifying", "teamA": "Electron", "teamB": "Proton", "s1A": "-", "s1B": "-", "s2A": "-", "s2B": "-", "s3A": "-", "s3B": "-", "setsWonA": "-", "setsWonB": "-", "matchWinner": "TBD"}, {"sport": "tabletennis", "category": "mix_double", "match": "M3", "stage": "Qualifying", "teamA": "Neutron", "teamB": "Electron", "s1A": "-", "s1B": "-", "s2A": "-", "s2B": "-", "s3A": "-", "s3B": "-", "setsWonA": "-", "setsWonB": "-", "matchWinner": "TBD"}, {"sport": "tabletennis", "category": "mix_double", "match": "M4", "stage": "Final", "teamA": "Pending", "teamB": "Pending", "s1A": "-", "s1B": "-", "s2A": "-", "s2B": "-", "s3A": "-", "s3B": "-", "setsWonA": "-", "setsWonB": "-", "matchWinner": "TBD"}, {"sport": "tabletennis", "category": "single_female", "match": "M1", "stage": "Qualifying", "teamA": "Proton", "teamB": "Neutron", "s1A": "-", "s1B": "-", "s2A": "-", "s2B": "-", "s3A": "-", "s3B": "-", "setsWonA": "-", "setsWonB": "-", "matchWinner": "TBD"}, {"sport": "tabletennis", "category": "single_female", "match": "M2", "stage": "Qualifying", "teamA": "Electron", "teamB": "Proton", "s1A": "-", "s1B": "-", "s2A": "-", "s2B": "-", "s3A": "-", "s3B": "-", "setsWonA": "-", "setsWonB": "-", "matchWinner": "TBD"}, {"sport": "tabletennis", "category": "single_female", "match": "M3", "stage": "Qualifying", "teamA": "Neutron", "teamB": "Electron", "s1A": "-", "s1B": "-", "s2A": "-", "s2B": "-", "s3A": "-", "s3B": "-", "setsWonA": "-", "setsWonB": "-", "matchWinner": "TBD"}, {"sport": "tabletennis", "category": "single_female", "match": "M4", "stage": "Final", "teamA": "Pending", "teamB": "Pending", "s1A": "-", "s1B": "-", "s2A": "-", "s2B": "-", "s3A": "-", "s3B": "-", "setsWonA": "-", "setsWonB": "-", "matchWinner": "TBD"}, {"sport": "tabletennis", "category": "single_male", "match": "M1", "stage": "Qualifying", "teamA": "Proton", "teamB": "Neutron", "s1A": "-", "s1B": "-", "s2A": "-", "s2B": "-", "s3A": "-", "s3B": "-", "setsWonA": "-", "setsWonB": "-", "matchWinner": "TBD"}, {"sport": "tabletennis", "category": "single_male", "match": "M2", "stage": "Qualifying", "teamA": "Electron", "teamB": "Proton", "s1A": "-", "s1B": "-", "s2A": "-", "s2B": "-", "s3A": "-", "s3B": "-", "setsWonA": "-", "setsWonB": "-", "matchWinner": "TBD"}, {"sport": "tabletennis", "category": "single_male", "match": "M3", "stage": "Qualifying", "teamA": "Neutron", "teamB": "Electron", "s1A": "-", "s1B": "-", "s2A": "-", "s2B": "-", "s3A": "-", "s3B": "-", "setsWonA": "-", "setsWonB": "-", "matchWinner": "TBD"}, {"sport": "tabletennis", "category": "single_male", "match": "M4", "stage": "Final", "teamA": "Pending", "teamB": "Pending", "s1A": "-", "s1B": "-", "s2A": "-", "s2B": "-", "s3A": "-", "s3B": "-", "setsWonA": "-", "setsWonB": "-", "matchWinner": "TBD"}, {"sport": "volleyball", "category": "main", "match": "M1", "stage": "Qualifying", "teamA": "Proton", "teamB": "Neutron", "s1A": "25", "s1B": "21", "s2A": "23", "s2B": "25", "s3A": "15", "s3B": "11", "setsWonA": "2", "setsWonB": "1", "matchWinner": "Proton"}, {"sport": "volleyball", "category": "main", "match": "M2", "stage": "Qualifying", "teamA": "Electron", "teamB": "Proton", "s1A": "20", "s1B": "25", "s2A": "22", "s2B": "25", "s3A": "-", "s3B": "-", "setsWonA": "0", "setsWonB": "2", "matchWinner": "Proton"}, {"sport": "volleyball", "category": "main", "match": "M3", "stage": "Qualifying", "teamA": "Neutron", "teamB": "Electron", "s1A": "25", "s1B": "18", "s2A": "25", "s2B": "20", "s3A": "-", "s3B": "-", "setsWonA": "2", "setsWonB": "0", "matchWinner": "Neutron"}, {"sport": "volleyball", "category": "main", "match": "M4", "stage": "Final", "teamA": "Pending", "teamB": "Pending", "s1A": "-", "s1B": "-", "s2A": "-", "s2B": "-", "s3A": "-", "s3B": "-", "setsWonA": "-", "setsWonB": "-", "matchWinner": "TBD"}, {"sport": "futsal", "category": "main", "match": "M1", "stage": "Qualifying", "teamA": "Neutron", "teamB": "Electron", "scoreA": "3", "scoreB": "2", "matchWinner": "Neutron", "penaltyA": "-", "penaltyB": "-", "penaltyWinner": "-"}, {"sport": "futsal", "category": "main", "match": "M2", "stage": "Qualifying", "teamA": "Proton", "teamB": "Electron", "scoreA": "1", "scoreB": "1", "matchWinner": "Draw", "penaltyA": "4", "penaltyB": "3", "penaltyWinner": "Proton"}, {"sport": "futsal", "category": "main", "match": "M3", "stage": "Qualifying", "teamA": "Neutron", "teamB": "Proton", "scoreA": "2", "scoreB": "2", "matchWinner": "Draw", "penaltyA": "5", "penaltyB": "4", "penaltyWinner": "Neutron"}, {"sport": "futsal", "category": "main", "match": "M4", "stage": "Final", "teamA": "Pending", "teamB": "Pending", "scoreA": "-", "scoreB": "-", "matchWinner": "TBD", "penaltyA": "-", "penaltyB": "-", "penaltyWinner": "TBD"}, {"sport": "chairball", "category": "main", "match": "M1", "stage": "Qualifying", "teamA": "Neutron", "teamB": "Electron", "scoreA": "4", "scoreB": "3", "matchWinner": "Neutron", "penaltyA": "-", "penaltyB": "-", "penaltyWinner": "-"}, {"sport": "chairball", "category": "main", "match": "M2", "stage": "Qualifying", "teamA": "Proton", "teamB": "Electron", "scoreA": "2", "scoreB": "5", "matchWinner": "Electron", "penaltyA": "-", "penaltyB": "-", "penaltyWinner": "-"}, {"sport": "chairball", "category": "main", "match": "M3", "stage": "Qualifying", "teamA": "Neutron", "teamB": "Proton", "scoreA": "3", "scoreB": "1", "matchWinner": "Neutron", "penaltyA": "-", "penaltyB": "-", "penaltyWinner": "-"}, {"sport": "chairball", "category": "main", "match": "M4", "stage": "Final", "teamA": "Pending", "teamB": "Pending", "scoreA": "-", "scoreB": "-", "matchWinner": "TBD", "penaltyA": "-", "penaltyB": "-", "penaltyWinner": "-"}];
// Walkathon is persistent: never write 0/demo unless user explicitly types 0.
const EMPTY_WALK={Proton:"", Neutron:"", Electron:""};
let currentWalkathon={Proton:null, Neutron:null, Electron:null};
const app=initializeApp(firebaseConfig), db=getDatabase(app);
const teams=["Proton","Neutron","Electron","Pending","TBD","Draw","-"], sports=["badminton","tabletennis","volleyball","futsal","chairball"], cats=["double_male","double_female","double_mix","mix_double","single_female","single_male","main"], stages=["Qualifying","Final"];
const tb=document.getElementById("tbody"), st=document.getElementById("status");
const wProtonEl=document.getElementById("wProton"), wNeutronEl=document.getElementById("wNeutron"), wElectronEl=document.getElementById("wElectron");
function sel(v,arr,c){return `<select class="${c}">${arr.map(x=>`<option value="${x}" ${String(v)==x?"selected":""}>${x}</option>`).join("")}</select>`}
function inp(v,c){return `<input class="${c}" value="${v??""}">`}
function render(rows){tb.innerHTML=""; rows.forEach(r=>{let tr=document.createElement("tr"); tr.innerHTML=`<td>${sel(r.sport,sports,"sport")}</td><td>${sel(r.category||"main",cats,"category")}</td><td>${inp(r.match,"match small")}</td><td>${sel(r.stage||"Qualifying",stages,"stage")}</td><td>${sel(r.teamA||"",teams,"teamA")}</td><td>${inp(r.playersA||"","playersA")}</td><td>${sel(r.teamB||"",teams,"teamB")}</td><td>${inp(r.playersB||"","playersB")}</td><td>${inp(r.s1A||"-","s1A small")}</td><td>${inp(r.s1B||"-","s1B small")}</td><td>${inp(r.s2A||"-","s2A small")}</td><td>${inp(r.s2B||"-","s2B small")}</td><td>${inp(r.s3A||"-","s3A small")}</td><td>${inp(r.s3B||"-","s3B small")}</td><td>${inp(r.setsWonA||"-","setsWonA small")}</td><td>${inp(r.setsWonB||"-","setsWonB small")}</td><td>${inp(r.scoreA||"-","scoreA small")}</td><td>${inp(r.scoreB||"-","scoreB small")}</td><td>${sel(r.matchWinner||"TBD",teams,"matchWinner")}</td><td>${inp(r.penaltyA||"-","penaltyA small")}</td><td>${inp(r.penaltyB||"-","penaltyB small")}</td><td>${sel(r.penaltyWinner||"-",teams,"penaltyWinner")}</td>`; tb.appendChild(tr);})}
function collect(){return [...tb.querySelectorAll("tr")].map(tr=>{let q=c=>tr.querySelector("."+c)?.value||""; return {sport:q("sport"),category:q("category"),match:q("match"),stage:q("stage"),teamA:q("teamA"),playersA:q("playersA"),teamB:q("teamB"),playersB:q("playersB"),s1A:q("s1A"),s1B:q("s1B"),s2A:q("s2A"),s2B:q("s2B"),s3A:q("s3A"),s3B:q("s3B"),setsWonA:q("setsWonA"),setsWonB:q("setsWonB"),scoreA:q("scoreA"),scoreB:q("scoreB"),matchWinner:q("matchWinner"),penaltyA:q("penaltyA"),penaltyB:q("penaltyB"),penaltyWinner:q("penaltyWinner")}})}
function validNumberFromInput(el, fallback){
  const raw=String(el?.value ?? "").trim();
  if(raw==="") return fallback;
  const parsed=Number(raw);
  return Number.isFinite(parsed) ? parsed : fallback;
}
function walk(){
  return {
    Proton: validNumberFromInput(wProtonEl, currentWalkathon.Proton),
    Neutron: validNumberFromInput(wNeutronEl, currentWalkathon.Neutron),
    Electron: validNumberFromInput(wElectronEl, currentWalkathon.Electron)
  };
}
function setWalk(w){
  if(!w || typeof w!=="object") return;
  const next={
    Proton: Number(w.Proton ?? w.proton ?? currentWalkathon.Proton ?? 0),
    Neutron: Number(w.Neutron ?? w.neutron ?? currentWalkathon.Neutron ?? 0),
    Electron: Number(w.Electron ?? w.electron ?? currentWalkathon.Electron ?? 0)
  };
  currentWalkathon=next;
  wProtonEl.value=next.Proton;
  wNeutronEl.value=next.Neutron;
  wElectronEl.value=next.Electron;
}
async function load(){
  try{
    st.textContent="Loading...";
    let s=await get(ref(db,"scores"));
    let w=await get(ref(db,"walkathon"));
    render(s.exists()?Object.values(s.val()):DEFAULT_SCORES);
    if(w.exists()){
      setWalk(w.val());
      st.textContent="Loaded Firebase scores + walkathon";
    }else{
      wProtonEl.value=""; wNeutronEl.value=""; wElectronEl.value="";
      st.textContent="Loaded scores; walkathon missing in Firebase";
    }
  }catch(e){console.error(e); st.textContent="Load error: "+e.message; alert("Load error: "+e.message);}
}
async function save(){
  try{
    st.textContent="Saving...";
    const scores=collect();
    const walkathon=walk();
    if([walkathon.Proton, walkathon.Neutron, walkathon.Electron].some(v=>!Number.isFinite(Number(v)))){
      throw new Error("Walkathon values must be numbers. Do not leave them blank.");
    }
    await set(ref(db,"scores"),scores);
    await set(ref(db,"walkathon"),walkathon);
    const check=await get(ref(db,"walkathon"));
    if(check.exists()) setWalk(check.val());
    st.textContent="Saved to Firebase "+new Date().toLocaleTimeString();
  }catch(e){console.error(e); st.textContent="Save error: "+e.message; alert("Save error: "+e.message);}
}
async function reset(){
  try{
    if(!confirm("Reset scores only? Walkathon step counts will NOT be changed."))return;
    st.textContent="Resetting scores only...";
    await set(ref(db,"scores"),DEFAULT_SCORES);
    await load();
    st.textContent="Scores restored; walkathon kept";
  }catch(e){console.error(e); st.textContent="Reset error: "+e.message; alert("Reset error: "+e.message);}
}
document.getElementById("save").addEventListener("click", save);
document.getElementById("load").addEventListener("click", load);
document.getElementById("reset").addEventListener("click", reset);
load().catch(e=>{console.error(e);st.textContent="Error: "+e.message;render(DEFAULT_SCORES);setWalk(EMPTY_WALK);});
</script></body></html>
